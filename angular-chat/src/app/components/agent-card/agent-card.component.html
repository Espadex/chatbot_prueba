<div class="agent-card" *ngIf="agent">
    <div class="card-header">
        <div class="agent-icon">
            <span *ngIf="agent.name === 'Practice Chats'">💬</span>
            <span *ngIf="agent.name !== 'Practice Chats'">🤖</span>
        </div>
        <div class="agent-info">
            <h3>{{ agent.name }}</h3>
            <span class="agent-role">{{ agent.model }}</span>
        </div>
    </div>

    <p class="agent-desc">{{ agent.description }}</p>

    <div class="card-footer">
        <span class="status-pill" [class.confidential]="!agent.isEnabled">
            {{ agent.isEnabled ? 'Unrestricted' : 'Disabled' }}
        </span>
        <div class="card-actions">
            <!-- Dynamically link to chat view by agentId -->
            <a [routerLink]="['/chat', agent.agentId]" class="btn btn-try">Try</a>

            <button class="btn btn-edit">Edit</button>
        </div>
    </div>
</div>
